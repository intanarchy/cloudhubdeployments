name: MuleSoft CI/CD to CloudHub 2.0

run-name: "Deploy ${{ github.ref_name }} by ${{ github.actor }} @ ${{ github.sha }}"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Maven settings.xml from secrets
        run: |
          cat > settings.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <settings>
            <servers>
              <server>
                <id>anypoint-exchange-v3</id>
                <username>~~~Client~~~</username>
                <password>${anypoint.client_id}~${anypoint.client_secret}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t mulesoft-deployer:latest .

      - name: Deploy to CloudHub 2.0
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/settings.xml:/root/.m2/settings.xml \
            mulesoft-deployer:latest \
            clean deploy \
            -s /root/.m2/settings.xml \
            -Danypoint.client_id=${{ secrets.ANYPOINT_CLIENT_ID }} \
            -Danypoint.client_secret=${{ secrets.ANYPOINT_CLIENT_SECRET }} \
            -DmuleDeploy \
            -DskipTests

      - name: Deployment Success
        if: success()
        run: |
          echo "============================================"
          echo "  DEPLOYMENT SUCCESSFUL"
          echo "============================================"
          echo "  App     : cloudhubdeployments"
          echo "  Env     : Sandbox"
          echo "  Target  : Cloudhub-US-East-2"
          echo "  Branch  : ${{ github.ref_name }}"
          echo "  Commit  : ${{ github.sha }}"
          echo "  By      : ${{ github.actor }}"
          echo "============================================"

      - name: Deployment Failed
        if: failure()
        run: |
          echo "============================================"
          echo "  DEPLOYMENT FAILED"
          echo "============================================"
          echo "  Branch  : ${{ github.ref_name }}"
          echo "  Commit  : ${{ github.sha }}"
          echo "  By      : ${{ github.actor }}"
          echo "  Check logs above for the error details."
          echo "============================================"