name: MuleSoft CI/CD to CloudHub 2.0

on:
  push:
    branches:
      - main        # triggers on push to main
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t mulesoft-deployer:latest .

      - name: Deploy to CloudHub 2.0
        run: |
          docker run --rm \
            -e ANYPOINT_CLIENT_ID=${{ secrets.ANYPOINT_CLIENT_ID }} \
            -e ANYPOINT_CLIENT_SECRET=${{ secrets.ANYPOINT_CLIENT_SECRET }} \
            mulesoft-deployer:latest \
            deploy \
            -s /root/.m2/settings.xml \
            -Danypoint.client_id=${{ secrets.ANYPOINT_CLIENT_ID }} \
            -Danypoint.client_secret=${{ secrets.ANYPOINT_CLIENT_SECRET }} \
            -DskipTests