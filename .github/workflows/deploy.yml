name: MuleSoft CI/CD to CloudHub 2.0

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Maven settings.xml from secrets
        run: |
          cat > settings.xml <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <settings>
            <servers>
              <server>
                <id>anypoint-exchange-v3</id>
                <username>~~~Client~~~</username>
                <password>${{ secrets.ANYPOINT_CLIENT_SECRET }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t mulesoft-deployer:latest .

      - name: Deploy to CloudHub 2.0
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/settings.xml:/root/.m2/settings.xml \
            mulesoft-deployer:latest \
            deploy \
            -s /root/.m2/settings.xml \
            -Danypoint.client_id=${{ secrets.ANYPOINT_CLIENT_ID }} \
            -Danypoint.client_secret=${{ secrets.ANYPOINT_CLIENT_SECRET }} \
            -DskipTests

      - name: Deployment success notification
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "App: cloudhubdeployments"
          echo "Environment: Sandbox"
          echo "Target: Cloudhub-US-East-2"

      - name: Deployment failure notification
        if: failure()
        run: |
          echo "❌ Deployment failed. Check the logs above for details."