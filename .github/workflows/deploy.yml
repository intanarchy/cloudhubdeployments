name: MuleSoft CI/CD to CloudHub 2.0

run-name: "Deploy ${{ github.ref_name }} by ${{ github.actor }} @ ${{ github.sha }}"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Maven settings.xml from secrets
        run: |
          cat > settings.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <settings>
            <servers>
              <server>
                <id>anypoint-exchange-v3</id>
                <username>~~~Client~~~</username>
                <password>${anypoint.client_id}~${anypoint.client_secret}</password>
              </server>
            </servers>
          </settings>
          EOF

      # NEW: Log into your personal Docker Hub account
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # NEW: Build the image and PUSH it to Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # This names the image using your specific Docker Hub username
          tags: ${{ secrets.DOCKER_USERNAME }}/mulesoft-deployer:latest

      # UPDATED: Run the deployment using the image that was just pushed
      - name: Deploy to CloudHub 2.0
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/settings.xml:/root/.m2/settings.xml \
            ${{ secrets.DOCKER_USERNAME }}/mulesoft-deployer:latest \
            clean deploy \
            -s /root/.m2/settings.xml \
            -Danypoint.client_id=${{ secrets.ANYPOINT_CLIENT_ID }} \
            -Danypoint.client_secret=${{ secrets.ANYPOINT_CLIENT_SECRET }} \
            -DmuleDeploy \
            -DskipTests

      - name: Deployment Success
        if: success()
        run: |
          echo "============================================"
          echo "  DEPLOYMENT SUCCESSFUL"
          echo "============================================"

      - name: Deployment Failed
        if: failure()
        run: |
          echo "============================================"
          echo "  DEPLOYMENT FAILED"
          echo "============================================"